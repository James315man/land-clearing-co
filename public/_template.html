<!-- SHARED STYLES - copy into each page -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d1f10;--charcoal:#111f14;--earth:#1c3822;
  --amber:#2ecc5f;--gold:#4ddb78;
  --cream:#f0faf2;--sand:#a8cdb0;
  --fd:'Barlow Condensed',Impact,sans-serif;
  --fb:'Inter',-apple-system,sans-serif;
}
body{font-family:var(--fb);background:var(--cream);color:var(--ink);line-height:1.6;overflow-x:hidden}
a{text-decoration:none;color:inherit}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:1rem 5vw;background:rgba(13,31,16,.97);backdrop-filter:blur(16px);box-shadow:0 2px 20px rgba(0,0,0,.5)}
.logo{font-family:var(--fd);font-size:1.2rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#f0faf2}
.logo span{color:#4ddb78}
.nav-cta{background:#2ecc5f;color:#0d1f10;padding:.6rem 1.3rem;border-radius:4px;font-weight:700;font-size:.83rem;letter-spacing:.04em;text-transform:uppercase}
.hero{min-height:100vh;background:#0d1f10;display:flex;flex-direction:column;justify-content:center;padding:7rem 5vw 4rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(to bottom,#2ecc5f,#4ddb78,transparent)}
.badge{display:inline-flex;align-items:center;background:rgba(46,204,95,.12);border:1px solid rgba(46,204,95,.3);padding:.35rem 1rem;border-radius:50px;margin-bottom:1.8rem;color:#4ddb78;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
h1{font-family:var(--fd);font-size:clamp(3rem,7vw,6rem);font-weight:900;line-height:.95;text-transform:uppercase;margin-bottom:1.8rem;color:#f0faf2}
h1 em{color:#2ecc5f;font-style:normal;display:block}
.hero-sub{font-size:clamp(.92rem,1.2vw,1.05rem);color:rgba(240,250,242,.72);max-width:500px;line-height:1.72;margin-bottom:2.2rem}
.btn-p{display:inline-flex;align-items:center;gap:.5rem;background:#2ecc5f;color:#0d1f10;padding:1rem 2.2rem;border-radius:4px;font-weight:700;font-size:.9rem;letter-spacing:.05em;text-transform:uppercase;transition:all .22s;margin-right:1rem;margin-bottom:.75rem}
.btn-p:hover{background:#4ddb78;transform:translateY(-2px)}
.btn-s{display:inline-flex;align-items:center;gap:.5rem;background:transparent;color:#f0faf2;border:2px solid rgba(255,255,255,.35);padding:1rem 2.2rem;border-radius:4px;font-weight:700;font-size:.9rem;letter-spacing:.05em;text-transform:uppercase;transition:all .22s;margin-bottom:.75rem}
.btn-s:hover{border-color:#f0faf2;background:rgba(255,255,255,.08)}
.pills{display:flex;border-top:1px solid rgba(255,255,255,.08);padding-top:1.5rem;flex-wrap:wrap;margin-top:1rem}
.pill{flex:1 1 80px;padding-right:1.25rem;border-right:1px solid rgba(255,255,255,.08);margin-right:1.25rem}
.pill:last-child{border-right:none;margin-right:0}
.pv{font-family:var(--fd);font-size:1.3rem;font-weight:800;color:#2ecc5f}
.pl{font-size:.63rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(240,250,242,.4)}
.pbar{background:#2ecc5f;padding:1rem 5vw}
.pbar-in{max-width:1160px;margin:0 auto;display:flex;gap:2rem;flex-wrap:wrap;justify-content:center;align-items:center}
.pbar span{font-weight:700;font-size:.82rem;letter-spacing:.05em;color:#0d1f10;text-transform:uppercase}
.sec{padding:5rem 5vw}
.con{max-width:1160px;margin:0 auto}
.ey{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#2ecc5f;margin-bottom:.6rem}
h2{font-family:var(--fd);font-size:clamp(2.4rem,5vw,3.8rem);font-weight:800;line-height:.95;text-transform:uppercase;margin-bottom:1.1rem}
h3{font-family:var(--fd);font-size:1.6rem;font-weight:800;text-transform:uppercase;margin-bottom:.5rem}
p{line-height:1.72;margin-bottom:1rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem;margin-top:2.5rem}
.card{background:rgba(13,31,16,.04);border:1px solid rgba(13,31,16,.1);border-radius:10px;padding:2rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1.5rem;margin-top:2rem}
.stat{text-align:center;padding:1.75rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px}
.sv{font-family:var(--fd);font-size:3rem;font-weight:900;color:#2ecc5f;line-height:1}
.sl{font-size:.78rem;text-transform:uppercase;letter-spacing:.1em;color:#a8cdb0;margin-top:.4rem}
.chk{list-style:none;display:flex;flex-direction:column;gap:.65rem;margin-top:1.25rem}
.chk li{display:flex;gap:.75rem;align-items:flex-start;font-size:.92rem}
.chk li::before{content:'✔';color:#2ecc5f;font-weight:700;flex-shrink:0}
.fi{border-bottom:1px solid rgba(13,31,16,.12)}
.fq{width:100%;display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:1.2rem 0;background:none;border:none;cursor:pointer;font-family:var(--fb);font-size:.97rem;font-weight:600;color:#0d1f10;text-align:left}
.fa{max-height:0;overflow:hidden;transition:max-height .4s ease}
.fa.open{max-height:300px}
.fa p{padding-bottom:1.25rem;font-size:.92rem;color:#2a5032;line-height:1.7}
footer{background:#0d1f10;border-top:1px solid rgba(255,255,255,.05);padding:3rem 5vw 2rem}
@media(max-width:780px){.g2,.g2-sticky{grid-template-columns:1fr}.g3{grid-template-columns:1fr}}
</style>
